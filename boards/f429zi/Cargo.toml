[profile.release]
debug = 2  # Enable debug info for RTT/defmt

# Enable NRVO in debug builds so that large Kernel<C> structs (32KB+) are not
# double-copied onto the MSP stack during construction. Generic functions like
# Kernel::with_config are monomorphized in the calling crate (f429zi), not the
# kernel crate, so this override must be on the f429zi package itself.
# Without this, with_config() allocates a ~77KB frame and overflows SRAM
# when using AlignedStack4K (2 × 4KB partition stacks → 32KB+ Kernel<C>).
# opt-level=1 enables NRVO + basic inlining while keeping debug symbols.
[profile.dev]
opt-level = 1
