name: CI

on:
  push:
  pull_request:

jobs:
  qemu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7m-none-eabi, thumbv7em-none-eabihf
          components: rustfmt, clippy, llvm-tools-preview

      - uses: swatinem/rust-cache@v2

      - name: Install QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-system-arm

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run CI
        run: ./scripts/ci.sh

  hardware:
    needs: qemu
    runs-on: [self-hosted, stm32]
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf

      - name: Build hw_integration
        run: >
          cargo build -p kernel --example hw_integration
          --features log-rtt
          --target thumbv7em-none-eabihf
          --release

      - name: Run hardware tests
        run: >
          ./scripts/probe-rs-ci.sh
          --elf target/thumbv7em-none-eabihf/release/examples/hw_integration
          --chip "${{ vars.HARDWARE_CHIP || 'STM32F429ZI' }}"
