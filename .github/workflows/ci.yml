name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: never

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7m-none-eabi
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: clippy (host)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: clippy (embedded)
        run: cargo clippy -p kernel --target thumbv7m-none-eabi -- -D warnings

  test:
    name: Host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace

  qemu:
    name: QEMU examples
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7m-none-eabi

      - uses: swatinem/rust-cache@v2

      - name: Install QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-system-arm

      - name: Run QEMU examples
        run: ./scripts/run-qemu-examples.sh --qemu-peripherals

  feature-combos:
    name: Feature combo – ${{ matrix.features }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "log-rtt"
          - "log-rtt,log-swo"
          - "log-rtt,log-defmt"
          - "log-semihosting,log-rtt"
          - "log-semihosting,log-defmt"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7m-none-eabi

      - uses: swatinem/rust-cache@v2
        with:
          key: combo-${{ matrix.features }}

      - name: Build kernel examples
        run: cargo build -p kernel --examples --features "${{ matrix.features }}" --target thumbv7m-none-eabi
