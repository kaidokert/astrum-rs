name: Boards

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.board }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: f207
            features: kernel-mpu
          - board: f429zi
            features: kernel-mpu
          - board: nrf52
            features: kernel-mpu
          - board: same51_curiosity
            features: kernel-mpu
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7m-none-eabi, thumbv7em-none-eabihf

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: boards/${{ matrix.board }}
          key: ${{ matrix.board }}

      - name: Build examples
        working-directory: boards/${{ matrix.board }}
        run: cargo build --examples --features ${{ matrix.features }}
