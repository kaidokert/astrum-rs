[package]
name = "plib"
version = "0.1.0"
edition = "2021"
description = "Partition library: user-space helpers for partitions"

[dependencies]
kernel = { path = "../kernel", default-features = false }
rtos-traits = { path = "../rtos-traits" }

[features]
default = []
# Note: kernel dependency is only needed for the svc! macro (syscall interface).
# DebugRingBuffer and other shared types come from rtos-traits.
partition-debug = ["rtos-traits/partition-debug"]
