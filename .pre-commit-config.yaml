repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path kernel/Cargo.toml -- --check
        language: system
        files: \.rs$
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path kernel/Cargo.toml --target thumbv7m-none-eabi --lib --examples --features qemu -- -D warnings
        language: system
        files: \.rs$
        pass_filenames: false
      - id: check-rtt-lint
        name: "check rtt_init_print! confined to boot.rs"
        entry: make check-rtt-lint
        language: system
        files: \.rs$
        pass_filenames: false
      - id: codespell
        name: codespell
        entry: codespell --skip="*.lock,./target"
        language: system
        types_or: [python, rust, markdown, yaml, toml]
