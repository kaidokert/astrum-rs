[features]
default = ["arinc-compat"]

# IPC primitives (optional, enabled via arinc-compat by default)
ipc-sampling = []
ipc-queuing = []
ipc-blackboard = ["plib/ipc-blackboard"]
ipc-message = []

# ARINC 653 compatibility: enables all optional IPC primitives
arinc-compat = ["ipc-sampling", "ipc-queuing", "ipc-blackboard", "ipc-message"]

# Omit the built-in minimal __INTERRUPTS vector table so that a
# custom one (e.g. from bind_interrupts!) can be linked instead.
custom-ivt = []
qemu = []
qemu-peripherals = ["dep:tudelft-lm3s6965-pac"]
partition-debug = ["rtos-traits/partition-debug"]
panic-halt = ["dep:panic-halt"]
log-semihosting = ["dep:cortex-m-semihosting", "dep:panic-semihosting"]
log-rtt = ["dep:rtt-target", "dep:panic-rtt-target", "dep:critical-section"]
log-swo = []
log-defmt = ["dep:defmt"]

# Multi-core: removes StaticIsrRing Sync impl (IRQ-masking insufficient on SMP).
# Use `single-core` as an explicit override when both are enabled (--all-features).
multi-core = []
single-core = []

# FPU context: save/restore FPU registers on context switch (Cortex-M4F+).
fpu-context = []

# Health monitoring for partition liveness and schedule integrity.
health-partition = []

# Mock HAL register bank for host-mode tests.
mock-hal = ["rtos-traits/mock-hal"]

# Loom concurrency model-checking (host-mode only).
loom = ["dep:loom"]

# SEGGER SystemView tracing via rtos-trace.
trace = ["dep:rtos-trace", "dep:systemview-target", "dep:rtt-target", "dep:critical-section"]

# Write panic diagnostics into a .noinit tombstone before the panic backend runs.
panic-tombstone = []


[target.'cfg(not(target_arch = "arm"))'.dependencies]
loom = { version = "0.7", optional = true }

[target.'cfg(target_arch = "arm")'.dependencies]
systemview-target = { version = "0.3", default-features = false, features = ["cortex-m", "callbacks-os", "ext-rtt-channels-2"], optional = true } # TODO: reviewer false positive – v0.3.0 only provides ext-rtt-channels-2, not ext-rtt-channels-1

[dev-dependencies]
plib = { path = "../plib" }

[target.'cfg(not(target_arch = "arm"))'.dev-dependencies]
rtos-traits = { path = "../rtos-traits", features = ["mock-hal"] }
trybuild = "1"

[target.'cfg(not(target_arch = "arm"))'.dev-dependencies.loom]
version = "0.7"
