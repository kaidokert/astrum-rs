[package]
name = "kernel"
version = "0.1.0"
edition = "2021"

[dependencies]
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
cortex-m-semihosting = "0.5"
panic-semihosting = { version = "0.6", features = ["exit"] }

[[example]]
name = "hello"
required-features = ["qemu"]

[[example]]
name = "panic_test"
required-features = ["qemu"]

[[example]]
name = "mpu_info"
required-features = ["qemu"]

[[example]]
name = "mpu_region"
required-features = ["qemu"]

[[example]]
name = "systick"
required-features = ["qemu"]

[features]
qemu = []
