[package]
name = "kernel"
version = "0.1.0"
edition = "2021"

[dependencies]
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = { version = "0.7", features = ["device"] }
critical-section = { version = "1.2", optional = true } # TODO: reviewer false positive – dep exists; trace feature's dep:critical-section is valid
cortex-m-semihosting = { version = "0.5", optional = true }
defmt = { version = "0.3", optional = true }
heapless = "0.8"
panic-halt = { version = "1.0", optional = true }
panic-rtt-target = { version = "0.2", optional = true }
panic-semihosting = { version = "0.6", features = ["exit"], optional = true }
rtos-traits = { path = "../rtos-traits" }
rtos-trace = { version = "0.2", default-features = false, optional = true }
rtt-target = { version = "0.6", optional = true }
tudelft-lm3s6965-pac = { version = "0.1", optional = true }

